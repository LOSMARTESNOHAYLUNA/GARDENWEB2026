<style>
:root { --paper:#FBF8F2; --paper-soft:#F4EFE4; --green:#1E4934; --gold:#B8954A; --gold-soft:#D6BC8A; --ink:#0F0F0D; --ink-soft:#2E2C28; --gray-soft:#6B6862; --line-soft:#EAE3D2; }
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { font-family:'Manrope',sans-serif; font-weight:300; color:var(--ink); background:var(--paper); min-height:100vh; display:flex; flex-direction:column; }
.header { padding:20px 32px; background:rgba(251,248,242,0.96); border-bottom:1px solid var(--line-soft); display:flex; align-items:center; justify-content:space-between; }
.logo { font-family:'Cormorant Garamond'; font-size:24px; color:var(--green); font-weight:500; text-decoration:none; }
.logo .it { font-style:italic; color:var(--gold); }
.main { flex:1; display:flex; align-items:center; justify-content:center; padding:60px 24px; }
.card { max-width:560px; text-align:center; }
.check-circle {
  width:80px; height:80px; border-radius:50%;
  background:var(--green); display:flex; align-items:center; justify-content:center;
  margin:0 auto 32px; font-size:36px;
}
h1 { font-family:'Cormorant Garamond'; font-size:clamp(32px,5vw,48px); color:var(--green); margin-bottom:16px; line-height:1.1; }
h1 .it { font-style:italic; color:var(--gold); }
.sub { font-family:'Manrope'; font-size:17px; font-weight:300; color:var(--ink-soft); line-height:1.7; margin-bottom:36px; }
.sub strong { font-weight:600; color:var(--green); }
.actions { display:flex; gap:16px; justify-content:center; flex-wrap:wrap; }
.btn { font-family:'Manrope'; font-weight:600; font-size:13px; letter-spacing:0.06em; text-transform:uppercase; padding:15px 30px; border-radius:100px; text-decoration:none; display:inline-flex; align-items:center; gap:8px; transition:transform 0.3s, box-shadow 0.3s; }
.btn-green { background:var(--green); color:var(--paper); }
.btn-green:hover { transform:translateY(-2px); box-shadow:0 10px 25px rgba(30,73,52,0.25); }
.btn-ghost { background:transparent; color:var(--green); border:1px solid #DDD5C3; }
.btn-ghost:hover { border-color:var(--green); }
.footer-note { padding:30px; text-align:center; font-family:'Manrope'; font-size:13px; color:var(--gray-soft); border-top:1px solid var(--line-soft); }
.footer-note a { color:var(--green); }
@media(max-width:480px) { .actions{flex-direction:column;align-items:center;} }

/* ===== DROPDOWN SERVICIOS ===== */
.has-dd { position:relative; }
.has-dd > a { display:flex; align-items:center; gap:5px; }
.has-dd > a::after { content:'▾'; font-size:10px; opacity:0.55; }
.dd-menu {
  position:absolute; top:calc(100% + 14px); left:50%;
  transform:translateX(-50%);
  background:var(--paper); border:1px solid var(--line-soft);
  box-shadow:0 24px 60px rgba(15,15,13,0.13);
  padding:24px 0; z-index:200; width:680px;
  display:grid; grid-template-columns:repeat(5,1fr);
  opacity:0; pointer-events:none;
  transition:opacity 0.2s ease, transform 0.2s ease;
  transform:translateX(-50%) translateY(6px);
}
.has-dd:hover .dd-menu,
.has-dd:focus-within .dd-menu {
  opacity:1; pointer-events:all;
  transform:translateX(-50%) translateY(0);
}
.dd-col { padding:0 18px; border-right:1px solid var(--line-soft); }
.dd-col:last-child { border-right:none; }
.dd-label {
  font-family:'Manrope'; font-size:9px; letter-spacing:0.25em;
  text-transform:uppercase; color:var(--gold); margin-bottom:12px;
  font-weight:600; display:block; padding-bottom:8px;
  border-bottom:1px solid var(--line-soft);
}
.dd-menu a {
  display:block; font-family:'Manrope'; font-size:13px; font-weight:300;
  color:var(--ink-soft); padding:5px 0; transition:color 0.2s;
  text-decoration:none; border-bottom:none !important;
  letter-spacing:0.01em; white-space:nowrap;
}
.dd-menu a:hover { color:var(--green); }
@media(max-width:968px) { .dd-menu { display:none !important; } }

</style>
</head>
<body>

<header class="header">
  <a href="/es/" class="logo">Garden <span class="it">Solution</span></a>

<main class="main">
  <div class="card">
    <div class="check-circle">✓</div>
    <h1>Mensaje enviado <span class="it">con éxito</span></h1>

      Hemos recibido tu solicitud. <strong>Te responderemos en menos de 24 horas</strong>
      para confirmar disponibilidad y coordinar la visita técnica gratuita.
    </p>
    <div class="actions">
      <a href="/es/" class="btn btn-green">Volver al inicio</a>
      <a href="tel:+34621493977" class="btn btn-ghost">Llamar ahora · 621 49 39 77</a>
    </div>
  </div>
</main>

<footer class="footer-note">
  <p>Garden Solution Mallorca SL · <a href="/es/politica-privacidad/">Política de privacidad</a> · <a href="/es/aviso-legal/">Aviso legal</a></p>
</footer>

</body>
</html>
